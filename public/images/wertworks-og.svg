  <path d="M845 257 L1000 167" stroke="#1fd69a" stroke-opacity=".68" stroke-width="8" stroke-linecap="round"/>
  <path d="M186 438 C326 316 426 492 548 354 S763 225 895 284" fill="none" stroke="#f0a63a" stroke-opacity=".75" stroke-width="3"/>

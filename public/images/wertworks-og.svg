      <stop offset="0" stop-color="#102033"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <radialGradient id="glow" cx="72%" cy="43%" r="52%">
      <stop offset="0" stop-color="#1fd69a" stop-opacity=".22"/>
      <stop offset=".55" stop-color="#1fd69a" stop-opacity=".05"/>
      <stop offset="1" stop-color="#1fd69a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#1fd69a" stroke-opacity=".10" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity=".75"/>
